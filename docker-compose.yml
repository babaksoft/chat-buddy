services:

  postgres:
    image: postgres:latest
    container_name: chat_buddy_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_buddy

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: chat_buddy_ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
